name: Sync Flights

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Call Supabase Edge Function
        run: |
          curl -X POST "https://dyewqcrqbhnbsseigcoa.supabase.co/functions/v1/sync-flights" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{}'
